<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom &amp; Jerry ვიდეოები</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="with-bg-image">

  <div class="topbar">
    <div class="brand">
      <img src="/assets/logo.png" alt="Tom and Jerry">
      Tom &amp; Jerry ვიდეოები
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="მოძებნე ვიდეო სახელით...">
    </div>
  </div>

  <div class="container">
    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">ვიდეო ვერ მოიძებნა 🐭</div>
  </div>

  <footer class="small-note">Tom &amp; Jerry Videos</footer>

  <!-- player modal -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="close-btn" id="closeModal">✕</button>
      </div>
      <video id="modalVideo" controls></video>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
